# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: 'stable'
        check-latest: true
        
    - name: Build
      run: go build -o ./bouncer -v .

    - name: Test
      run: go test -v ./...

    - name: Deploy
      uses: actions/upload-artifact@v4
      with:
        name: GoBNC_Linux
        path: ./bouncer

  WinBuild:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: 'stable'
        check-latest: true
        
    - name: Build
      run: go build -o ./bouncer.exe -v .

    - name: Test
      run: go test -v ./...

    - name: Deploy
      uses: actions/upload-artifact@v4
      with:
        name: GoBNC_Windows
        path: ./bouncer.exe
